# platformio.ini - PlatformIO configuration for MLX90640 thermal imaging system
# For ESP32-based thermal imaging with MLX90640 sensor

[platformio]
description = ESP32 MLX90640 Thermal Imaging Driver
default_envs = esp32-devkit

[env:esp32-devkit]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

# Serial configuration
monitor_speed = 115200
monitor_filters = send_on_enter, esp32_exception_decoder

# Build flags
build_flags =
    -DARDUINO_ARCH_ESP32
    -O2
    -std=c++17

# Include paths
build_include_search_path = .

# Library dependencies (Wire is built-in for ESP32)
lib_deps =

# Upload settings
upload_speed = 921600
upload_protocol = esptool

[env:esp32-s3]
# Alternative: ESP32-S3 variant
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_ARCH_ESP32
    -O2
    -std=c++17

[env:debug]
# Debug configuration with extended logging
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_ARCH_ESP32
    -g
    -O0
    -DDEBUG=1

[env:native]
# Native compilation for testing/CI (non-Arduino)
platform = native
build_flags = 
    -std=c++17
    -Wall
    -Wextra

# ============================================================================
# Integration Guide for PlatformIO
# ============================================================================
# 
# 1. Create new PlatformIO project:
#    > platformio init --board esp32doit-devkit-v1
#
# 2. Copy driver files to 'src/' or 'lib/' directory:
#    - MLX90640Driver.h
#    - MLX90640Driver.cpp
#    - thermal_imaging_example.cpp (or use as reference)
#
# 3. Create main sketch file (e.g., src/main.cpp) with setup() and loop()
#
# 4. Build project:
#    > platformio run
#
# 5. Upload to ESP32:
#    > platformio run --target upload
#
# 6. Monitor serial output:
#    > platformio device monitor --baud 115200
#
